# ── GitHub Action: Auto-sync to HuggingFace Space on push to main ──
name: Sync to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME below
          git remote add hf https://lonewollff:${HF_TOKEN}@huggingface.co/spaces/lonewollff/data-alchemy
          git push hf main --force
