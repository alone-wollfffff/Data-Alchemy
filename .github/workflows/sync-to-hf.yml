name: Sync to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: lonewollff
          HF_SPACE_NAME: Data_Alchemy
        run: |
          set -e

          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN secret."
            exit 1
          fi

          rm -rf .git

          git init
          git branch -M main
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git add .
          git commit -m "Automated sync to Hugging Face"

          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git push hf main --force
